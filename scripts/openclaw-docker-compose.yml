# Multi-Tenant OpenClaw Agent Platform
# Target: Oracle Cloud ARM A1 (4 OCPU, 22 GB RAM)

services:

  # ==========================================
  # REVERSE PROXY — auto-TLS, subdomain routing
  # ==========================================
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - /home/opc/worldtwin/weather:/srv/weather:ro
      - /data/cache:/srv/cache:ro
      - ./weatherwiz:/srv/weatherwiz:ro
      - caddy-config:/config
    networks:
      - frontend
      - worldtwin_edge
    deploy:
      resources:
        limits:
          memory: 128M

  # ==========================================
  # VECTOR DATABASE — shared, tenant-isolated by userId
  # ==========================================
