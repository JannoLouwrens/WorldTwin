  # restart: unless-stopped
  # expose:
  # - "8050"
  # environment:
  # - QDRANT_URL=http://qdrant:6333
  # - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
  # networks:
  # - backend
  # depends_on:
  # qdrant:
